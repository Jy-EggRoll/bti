name: Package Development Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+.dev.[0-9]+" # 匹配 x.y.z.dev.n 格式的开发版本标签
    workflow_dispatch: # 支持手动运行

permissions:
    contents: write

jobs:
    package:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.26.0"

            - name: Get version info
              id: get_version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    # 手动运行时，使用当前日期作为版本标识
                    VERSION="dev-$(date +%Y%m%d-%H%M%S)"
                    echo "Manual run - using timestamp version: $VERSION"
                  else
                    # Tag 触发时，从 tag 获取版本
                    VERSION=${GITHUB_REF#refs/tags/}
                    echo "Tag triggered - using tag version: $VERSION"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Get build time
              id: get_build_time
              run: |
                  BUILDTIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  echo "buildtime=$BUILDTIME" >> $GITHUB_OUTPUT

            - name: Build binaries for common platforms
              run: |
                  # 创建输出目录
                  mkdir -p build

                  VERSION="${{ steps.get_version.outputs.version }}"
                  BUILDTIME="${{ steps.get_build_time.outputs.buildtime }}"
                  LDFLAGS="-s -w -X 'battery-info/cmd.Version=$VERSION' -X 'battery-info/cmd.BuildTime=$BUILDTIME'"

                  echo "========================================"
                  echo "开始交叉编译 Go 二进制文件（仅常用平台）"
                  echo "========================================"
                  echo ""

                  # Windows (常用架构)
                  echo "[1/11] 编译 Windows x86 (386)..."
                  GOOS=windows GOARCH=386 go build -ldflags="$LDFLAGS" -o build/bti-windows-386.exe
                  echo "完成"

                  echo "[2/11] 编译 Windows x64 (amd64)..."
                  GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/bti-windows-amd64.exe
                  echo "完成"

                  echo "[3/11] 编译 Windows ARM64..."
                  GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/bti-windows-arm64.exe
                  echo "完成"

                  # Linux (常用架构)
                  echo ""
                  echo "[4/11] 编译 Linux x86 (386)..."
                  GOOS=linux GOARCH=386 go build -ldflags="$LDFLAGS" -o build/bti-linux-386
                  echo "完成"

                  echo "[5/11] 编译 Linux x64 (amd64)..."
                  GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/bti-linux-amd64
                  echo "完成"

                  echo "[6/11] 编译 Linux ARM (armv7)..."
                  GOOS=linux GOARCH=arm go build -ldflags="$LDFLAGS" -o build/bti-linux-arm
                  echo "完成"

                  echo "[7/11] 编译 Linux ARM64..."
                  GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/bti-linux-arm64
                  echo "完成"

                  # macOS (Darwin) (常用架构)
                  echo ""
                  echo "[8/11] 编译 macOS x64 (amd64)..."
                  GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/bti-darwin-amd64
                  echo "完成"

                  echo "[9/11] 编译 macOS ARM64 (Apple Silicon)..."
                  GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/bti-darwin-arm64
                  echo "完成"

                  # FreeBSD (常用架构)
                  echo ""
                  echo "[10/11] 编译 FreeBSD x64 (amd64)..."
                  GOOS=freebsd GOARCH=amd64 go build -ldflags="$LDFLAGS" -o build/bti-freebsd-amd64
                  echo "完成"

                  echo "[11/11] 编译 FreeBSD ARM64..."
                  GOOS=freebsd GOARCH=arm64 go build -ldflags="$LDFLAGS" -o build/bti-freebsd-arm64
                  echo "完成"

                  # 显示编译结果
                  echo ""
                  echo "========================================"
                  echo "编译完成！统计信息："
                  echo "========================================"
                  echo "总文件数: $(ls -1 build/ | wc -l)"
                  echo "总大小: $(du -sh build/ | cut -f1)"

            - name: Create development release (for tag runs only)
              if: github.event_name != 'workflow_dispatch'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: "bti v${{ steps.get_version.outputs.version }} (开发版)"
                  body: |
                      # 🚧 开发版本 - 仅供测试

                      这是一个开发版本，仅供测试使用。请谨慎使用，可能包含不稳定或实验性功能。

                      ## 📥 快速下载

                      | 架构 | Windows | Linux | macOS | FreeBSD |
                      |------|---------|-------|-------|---------|
                      | **x86 (32位)** | [x86](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-windows-386.exe) | [x86](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-linux-386) | 不支持 | 不支持 |
                      | **x64 (64位)** | [x64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-windows-amd64.exe) | [x64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-linux-amd64) | [x64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-darwin-amd64) | [x64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-freebsd-amd64) |
                      | **ARM64** | [ARM64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-windows-arm64.exe) | [ARM64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-linux-arm64) | [ARM64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-darwin-arm64) | [ARM64](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-freebsd-arm64) |
                      | **ARM (armv7)** | 不支持 | [ARM](https://github.com/Jy-EggRoll/bti/releases/download/${{ steps.get_version.outputs.version }}/bti-linux-arm) | 不支持 | 不支持 |

                      > 💡 **提示**：Windows 用户下载 `.exe` 文件，其他系统下载后需要添加执行权限 `chmod +x bti-*`

                      ---

                      ## 版本信息

                      - 版本号: ${{ steps.get_version.outputs.version }}
                      - 构建时间: ${{ github.run_id }}
                      - 提交: ${{ github.sha }}

                      ## 注意事项

                      ⚠️ 仅通过 GitHub Release 提供下载
                      ⚠️ 可能包含未经充分测试的功能

                      ---

                      📦 **安装方式：** 下载对应平台的二进制文件，赋予执行权限后直接运行。
                  files: |
                      build/*
                  draft: false
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-${{ steps.get_version.outputs.version }}
                  path: build/*
                  retention-days: 30
